stages:
  - build
  - publish
  - release
  - deploy

variables:
  PROJECT_NAME: woocommerce-extension
  RELEASE_ZIP: ${PROJECT_NAME}.zip
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PROJECT_NAME}/${CI_COMMIT_REF_NAME}"

build frontend:
  image: node:16-alpine
  stage: build
  script:
    - npm install
    - npm run build
  cache:
    paths:
      - node_modules
  artifacts:
    paths:
      - build/
    expire_in: 1 day
  only:
    - master
    - tags

create zip package:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  stage: publish
  needs:
    - job: "build frontend"
      artifacts: true
  before_script:
    - apk add --no-cache zip curl
  script:
    - mkdir ${PROJECT_NAME}
    - cp -rp build languages libraries src vendor dotypos.php plugin.json composer.json composer.lock ${PROJECT_NAME}
    - zip -r ${RELEASE_ZIP} ${PROJECT_NAME}
    - |
      if [ -n "${CI_COMMIT_TAG}" ]
      then
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ${RELEASE_ZIP} "${PACKAGE_REGISTRY_URL}/${RELEASE_ZIP}"
      fi
  cache: []
  artifacts:
    expire_in: 1 day
    paths:
      - ${RELEASE_ZIP}
  only:
    - master
    - tags

release job:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "running release job"
  cache: []
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'Created using the CI/CD pipeline'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_TAG'
    assets:
      links:
        - name: '${RELEASE_ZIP}'
          url: '${PACKAGE_REGISTRY_URL}/${RELEASE_ZIP}'

deploy to wp.jagu.dev:
  image: gitlab.jagu.cz:8081/infrastructure/containers-ci/deployer:latest
  stage: deploy
  needs:
    - job: "create zip package"
      artifacts: true
  environment:
    name: "wp.jagu.dev"
  cache: [ ]
  before_script:
    - eval $(ssh-agent -s)
    - ssh-add <(echo "$DEPLOYER_PRIVATE_KEY")
    - mkdir -p ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - scp -P $DEPLOYER_PORT "$RELEASE_ZIP" "$DEPLOYER_USER@$DEPLOYER_HOSTNAME:~/$RELEASE_ZIP"
    - ssh -p $DEPLOYER_PORT $DEPLOYER_USER@$DEPLOYER_HOSTNAME "sudo ./deploy-wp-dotypos.sh"
  only:
    - master
    - tags
